<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ngôi Nhà Lô Lô Chải - Sắp Xếp Căn Phòng</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root {
      --bg: #1a0f08;
      --surface: #f5ead8;
      --earth: #6B3A1F;
      --gold: #C8963E;
      --indigo: #2D3A6B;
      --glow: rgba(200,150,62,0.35);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      height: 100vh;
      font-family: 'Lora', serif;
      color: var(--earth);
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    #site-header {
      display: none;
      flex-shrink: 0;
      z-index: 50;
    }
    /* Header content floats over scene area */
    #header-float {
      position: fixed;
      top: 0;
      right: 260px; /* tray width */
      left: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      background: linear-gradient(180deg, rgba(26,15,8,0.85), transparent);
      z-index: 40;
      pointer-events: none;
    }
    #header-float > * { pointer-events: auto; }
    #header-float h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--gold);
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }
    #counter {
      font-size: 0.85rem;
      color: var(--surface);
      opacity: 0.85;
    }
    #header-actions { display: flex; gap: 6px; }
    #header-actions button {
      background: rgba(200,150,62,0.12);
      border: 1px solid rgba(200,150,62,0.25);
      color: var(--gold);
      width: 34px; height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    #header-actions button:hover {
      background: rgba(200,150,62,0.25);
      border-color: var(--gold);
    }
    #header-actions button.active {
      background: rgba(200,150,62,0.3);
      border-color: var(--gold);
    }

    /* ===== MAIN LAYOUT ===== */
    #main-area {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== INFO PANEL (left sidebar) ===== */
    #info-panel {
      width: 0;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1.5px solid var(--gold);
      overflow: hidden;
      transition: width 0.35s ease;
      z-index: 30;
      position: relative;
    }
    #info-panel.open {
      width: 320px;
    }
    #info-panel-inner {
      width: 320px;
      height: 100%;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #panel-close {
      align-self: flex-end;
      background: none; border: none;
      font-size: 1.3rem; color: var(--earth);
      cursor: pointer; opacity: 0.5;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: all 0.2s;
      flex-shrink: 0;
    }
    #panel-close:hover { opacity: 1; background: rgba(107,58,31,0.1); }
    #panel-photo-wrap {
      width: 100%; max-height: 200px;
      border-radius: 10px; border: 2px solid var(--gold);
      overflow: hidden; background: #e8dcc8;
      flex-shrink: 0;
    }
    #panel-photo { width: 100%; height: 100%; object-fit: cover; display: block; }
    #panel-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem; color: var(--earth); margin: 0;
    }
    #panel-name-en {
      font-family: 'Lora', serif; font-size: 0.7rem;
      color: var(--gold); margin: 0;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    #panel-desc {
      font-family: 'Lora', serif; font-size: 0.85rem;
      color: #4a3020; line-height: 1.6; margin: 0;
    }
    #panel-sound-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      background: rgba(200,150,62,0.12);
      border: 1px solid var(--gold);
      border-radius: 20px;
      color: var(--earth);
      font-family: 'Lora', serif; font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      align-self: flex-start;
    }
    #panel-sound-btn:hover {
      background: rgba(200,150,62,0.25);
    }

    /* ===== SCENE ===== */
    #scene-wrapper {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      overflow: hidden;
      padding: 8px;
      min-width: 0;
    }
    #scene {
      position: relative;
      height: 100%;
      max-height: calc(100vh - 16px);
      aspect-ratio: 1 / 1;
      overflow: visible;
      border-radius: 8px;
    }
    #room-bg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    #scene-dim {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      pointer-events: none;
      z-index: 5;
      transition: background 0.3s;
    }
    #scene-dim.active { background: rgba(0,0,0,0.35); }

    /* ===== ITEM TRAY (right sidebar) ===== */
    #item-tray {
      width: 260px;
      flex-shrink: 0;
      background: rgba(26,15,8,0.6);
      border-left: 1px solid rgba(200,150,62,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #tray-header {
      padding: 8px 10px;
      font-family: 'Playfair Display', serif;
      font-size: 0.8rem;
      color: var(--gold);
      text-align: center;
      border-bottom: 1px solid rgba(200,150,62,0.15);
      flex-shrink: 0;
    }
    #tray-items {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      align-content: start;
    }
    #tray-items::-webkit-scrollbar { width: 4px; }
    #tray-items::-webkit-scrollbar-thumb { background: rgba(200,150,62,0.3); border-radius: 2px; }

    .tray-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 8px 6px;
      background: rgba(200,150,62,0.08);
      border: 1px solid rgba(200,150,62,0.15);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tray-item:hover {
      background: rgba(200,150,62,0.18);
      border-color: var(--gold);
      transform: scale(1.05);
    }
    .tray-item.placed {
      opacity: 0.35;
    }
    .tray-item.placed img {
      filter: grayscale(0.5) brightness(0.7);
    }
    .tray-item img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.3));
      pointer-events: none;
    }
    .tray-item-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.6rem;
      color: var(--gold);
      line-height: 1.2;
      text-align: center;
      pointer-events: none;
    }
    .tray-sep {
      grid-column: 1 / -1;
      border-top: 1px solid rgba(200,150,62,0.15);
      margin: 2px 0;
    }
    .tray-label {
      grid-column: 1 / -1;
      font-family: 'Playfair Display', serif;
      font-size: 0.65rem;
      color: rgba(200,150,62,0.5);
      text-align: center;
      padding: 2px 0;
    }

    /* ===== ARTIFACT on scene ===== */
    .artifact {
      position: absolute;
      cursor: grab;
      z-index: 10;
      transition: filter 0.3s;
      transform-origin: center center;
      display: none; /* hidden until placed */
    }
    .artifact.placed { display: block; }
    .artifact img {
      width: 100%;
      height: auto;
      object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
    }
    .artifact:active { cursor: grabbing; }
    .artifact::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 50%;
      transform: translateX(-50%);
      width: 60%; height: 8px;
      background: radial-gradient(ellipse, var(--glow) 0%, transparent 70%);
      animation: glow-pulse 2s ease-in-out infinite;
      border-radius: 50%;
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.8; transform: translateX(-50%) scale(1.2); }
    }
    .artifact .artifact-ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 80%; height: 80%;
      border: 2px solid var(--gold);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      opacity: 0;
      animation: artifact-ring-pulse 2.5s ease-out infinite;
      pointer-events: none;
    }
    @keyframes artifact-ring-pulse {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
    }
    .artifact.discovered::after { animation: none; opacity: 0; }
    .artifact.discovered .artifact-ring { animation: none; opacity: 0; }
    .artifact-label {
      position: absolute;
      bottom: -16px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Playfair Display', serif;
      font-size: 0.6rem;
      color: var(--gold);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      pointer-events: none;
      font-weight: 600;
    }
    .artifact:hover .artifact-label { opacity: 1; }
    .artifact.selected, .decor.selected {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* ===== DECOR ===== */
    .decor {
      position: absolute;
      cursor: grab;
      z-index: 8;
      display: none;
    }
    .decor.placed { display: block; }
    .decor img {
      width: 100%; height: auto;
      object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(1px 2px 4px rgba(0,0,0,0.3));
    }
    .decor:active { cursor: grabbing; }

    /* ===== STRUCTURE ZONES (clickable areas on room) ===== */
    .structure-zone {
      position: absolute;
      cursor: pointer;
      z-index: 3;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .structure-zone:hover {
      background: rgba(200,150,62,0.1);
      outline: 1px dashed rgba(200,150,62,0.3);
    }

    /* ===== SPECIAL EFFECTS ===== */
    .artifact.fx-flame-burst img {
      filter: drop-shadow(0 0 15px rgba(255,100,0,0.7)) drop-shadow(0 0 30px rgba(255,60,0,0.4)) brightness(1.2);
    }
    .artifact.fx-ripple::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 120%; height: 120%;
      border: 2px solid var(--gold); border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      animation: ripple-out 0.8s ease-out forwards; pointer-events: none;
    }
    @keyframes ripple-out { to { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } }
    .artifact.fx-pattern-glow img { filter: drop-shadow(0 0 12px rgba(255,100,200,0.5)) brightness(1.15); }
    .artifact.fx-sparkle img { filter: drop-shadow(0 0 8px var(--gold)) drop-shadow(3px -3px 6px var(--gold)) brightness(1.2); }
    .artifact.fx-sway { animation: sway-anim 0.5s ease-in-out; }
    @keyframes sway-anim { 0%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} 100%{transform:translateX(0)} }
    .artifact.fx-smoke-puff img { filter: drop-shadow(0 -10px 20px rgba(180,170,160,0.5)) drop-shadow(2px 4px 6px rgba(0,0,0,0.4)); }
    .artifact.fx-thread-weave { animation: thread-weave-anim 0.6s ease-in-out; }
    @keyframes thread-weave-anim { 0%{transform:rotate(0)} 25%{transform:rotate(-2deg)} 75%{transform:rotate(2deg)} 100%{transform:rotate(0)} }

    /* (info panel CSS is above in layout section) */

    /* ===== COMPLETION ===== */
    #completion-overlay {
      position: fixed; inset: 0; background: rgba(26,15,8,0.9);
      z-index: 150; display: none; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px; backdrop-filter: blur(8px);
    }
    #completion-overlay h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold); margin-bottom: 12px; }
    #completion-overlay p { color: var(--surface); font-size: 0.9rem; opacity: 0.8; max-width: 480px; line-height: 1.6; }

    /* ===== FLOATING TOOLBAR ===== */
    #item-toolbar {
      position: absolute;
      display: none;
      z-index: 50;
      background: rgba(26,15,8,0.92);
      border: 1px solid var(--gold);
      border-radius: 24px;
      padding: 4px 8px;
      gap: 3px;
      align-items: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      pointer-events: auto;
    }
    #item-toolbar.visible { display: flex; }
    #item-toolbar button {
      width: 36px; height: 36px;
      background: none;
      border: none;
      color: var(--gold);
      font-size: 18px;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      line-height: 1;
    }
    #item-toolbar button:hover {
      background: rgba(200,150,62,0.2);
    }
    #item-toolbar button:active {
      background: rgba(200,150,62,0.35);
    }
    #item-toolbar .tb-sep {
      width: 1px;
      height: 18px;
      background: rgba(200,150,62,0.2);
      margin: 0 2px;
    }

    /* ===== BOTTOM HINT BAR ===== */
    #hint-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 260px; /* tray width */
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 6px 14px; background: rgba(26,15,8,0.7); color: #fff;
      font-family: 'Lora', serif; font-size: 11px;
      z-index: 40; opacity: 0.6;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>

  <div id="header-float">
    <h1>Ngôi Nhà Lô Lô Chải</h1>
    <div id="header-actions">
      <button id="sound-toggle" title="Bật/tắt nhạc nền">&#x1f507;</button>
      <button id="capture-btn" title="Chụp ảnh căn phòng">&#x1f4f7;</button>
      <button id="share-btn" title="Chia sẻ">&#x1f517;</button>
    </div>
  </div>

  <div id="main-area">
    <!-- INFO PANEL (left sidebar, hidden by default) -->
    <div id="info-panel">
      <div id="info-panel-inner">
        <button id="panel-close">&times;</button>
        <div id="panel-photo-wrap"><img id="panel-photo" src="" alt="" /></div>
        <h2 id="panel-name"></h2>
        <p id="panel-name-en"></p>
        <p id="panel-desc"></p>
        <button id="panel-sound-btn" style="display:none"></button>
      </div>
    </div>

    <!-- SCENE (center-right) -->
    <div id="scene-wrapper">
      <div id="scene">
        <img id="room-bg" src="assets/scene/room-bg.png?v=3" alt="Lo Lo Chai Room" />
        <div id="scene-dim"></div>
      </div>
    </div>

    <!-- ITEM TRAY (right) -->
    <div id="item-tray">
      <div id="tray-header">Vật Phẩm</div>
      <div id="tray-items"></div>
    </div>
  </div>

  <div id="hint-bar">
    Chọn vật phẩm bên phải để đặt vào phòng &nbsp;·&nbsp; Bấm vào vật phẩm trong phòng để chỉnh sửa
  </div>

  <div id="completion-overlay">
    <h2>Bạn đã khám phá tất cả 13 vật phẩm!</h2>
    <p>Mỗi vật phẩm là một mảnh ghép của văn hóa Lô Lô Chải — từ ngọn lửa bếp ấm cúng đến tiếng trống đồng vang vọng.</p>
  </div>

  <script>
    const ARTIFACTS = [
      { id:"bep-lua", name:"Bếp Lửa", nameEn:"Sacred Fireplace",
        description:"Bếp lửa là trung tâm của không gian sinh hoạt trong ngôi nhà truyền thống, nơi gắn với việc nấu ăn, sưởi ấm và quây quần gia đình. Ngọn lửa chưa bao giờ tắt. Đây là chi tiết quan trọng giúp toàn bộ góc nhà có hồn và có hơi thở đời sống.",
        photo:"assets/artifacts/01-bep-lua-real.png", sprite:"assets/artifacts/01-bep-lua-3d.png",
        sound:"assets/sounds/bep-lua.mp3", specialEffect:"flame-burst" },
      { id:"noi-dong", name:"Nồi Đồng", nameEn:"Bronze Pot",
        description:"Nồi đồng là vật dụng quen thuộc trong gian bếp truyền thống, gợi cảm giác đời sống gia đình mộc mạc và giản dị. Khi đặt trên bếp lửa, nồi đồng giúp cảnh vật trở nên sinh động và tự nhiên hơn.",
        photo:"assets/artifacts/02-noi-dong-real.png", sprite:"assets/artifacts/02-noi-dong-3d.png",
        sound:"assets/sounds/noi-dong.mp3", specialEffect:"smoke-puff" },
      { id:"gui-tre", name:"Gùi Tre", nameEn:"Bamboo Basket",
        description:"Gùi tre là vật dụng quen thuộc trong đời sống của người dân vùng cao, thường dùng để mang đồ, đựng nông sản hoặc vật dụng hằng ngày. Đưa gùi vào mô hình sẽ giúp góc nhà thêm tự nhiên và giàu bản sắc địa phương.",
        photo:"assets/artifacts/03-gui-tre-real.png", sprite:"assets/artifacts/03-gui-tre-3d.png",
        sound:"assets/sounds/gui-tre.mp3", specialEffect:"sway" },
      { id:"trong-dong", name:"Trống Đồng", nameEn:"Bronze Drum",
        description:"Trống đồng là biểu tượng văn hóa đặc trưng, gắn với đời sống tinh thần và bản sắc của cộng đồng Lô Lô. Tiếng trống vang lên mỗi dịp lễ hội. Dù được cách điệu theo phong cách chibi, vật phẩm này vẫn cần giữ nét trang trọng và nổi bật.",
        photo:"assets/artifacts/04-trong-dong-real.png", sprite:"assets/artifacts/04-trong-dong-3d.png",
        sound:"assets/sounds/trong-dong.mp3", specialEffect:"ripple" },
      { id:"vay-ao", name:"Váy Áo Lô Lô", nameEn:"Traditional Costume",
        description:"Váy áo Lô Lô là trang phục truyền thống đặc trưng nhất của phụ nữ dân tộc Lô Lô Chải, được may thủ công từ vải thổ cẩm với những họa văn thêu tay tinh xảo, màu sắc rực rỡ mang đậm bản sắc văn hóa miền núi.",
        photo:"assets/artifacts/05-vay-ao-real.png", sprite:"assets/artifacts/05-vay-ao-3d.png",
        sound:"assets/sounds/vay-ao.mp3", specialEffect:"pattern-glow" },
      { id:"khung-cui", name:"Khung Cửi", nameEn:"Weaving Loom",
        description:"Khung cửi dệt vải là dụng cụ truyền thống quan trọng nhất trong văn hóa người Lô Lô Chải, giúp các phụ nữ dân tộc dệt nên những tấm vải thổ cẩm với hoa văn độc đáo, rực rỡ. Không chỉ là công cụ lao động hàng ngày, khung cửi còn thể hiện sự khéo léo, cần cù và bản sắc văn hóa của cộng đồng.",
        photo:"assets/artifacts/06-khung-cui-real.png", sprite:"assets/artifacts/06-khung-cui-3d.png",
        sound:"assets/sounds/khung-cui.mp3", specialEffect:"thread-weave" },
      { id:"mu-trang-suc", name:"Mũ & Trang Sức", nameEn:"Hat & Silver Jewelry",
        description:"Mũ truyền thống là chi tiết nổi bật nhất trong trang phục phụ nữ Lô Lô Chải, được làm từ nhiều lớp vải thổ cẩm với màu sắc rực rỡ, hàng cúc kim loại và vô số tua rua, pom-pom xinh xắn. Trang sức bạc là \"báu vật\" không thể thiếu — vòng cổ to bản, khuyên tai dài, lắc tay chế tác thủ công tinh xảo từ bạc nguyên chất.",
        photo:"assets/artifacts/07-mu-real.png", sprite:"assets/artifacts/07-mu-3d.png",
        sound:"assets/sounds/mu-trang-suc.mp3", specialEffect:"sparkle" },

    function toggleItemSound(id, src) {
      if (!src) return;
      if (itemSounds[id] && itemSounds[id].playing) {
        // Stop this item's sound
        itemSounds[id].audio.pause();
        itemSounds[id].playing = false;
        return false; // now off
      } else {
        // Play (or resume) this item's sound
        if (!itemSounds[id]) {
          itemSounds[id] = { audio: new Audio(src), playing: false };
          itemSounds[id].audio.loop = true;
          itemSounds[id].audio.volume = 0.5;
        }
        itemSounds[id].audio.play().catch(() => {});
        itemSounds[id].playing = true;
        return true; // now on
      }
    }

    // ===== CAPTURE & SHARE =====
    function initCaptureShare() {
      document.getElementById("capture-btn").addEventListener("click", captureRoom);

    function captureRoom() {
      const scene = document.getElementById("scene");
      // Use html2canvas if available, otherwise simple canvas approach
      const canvas = document.createElement("canvas");
      const rect = scene.getBoundingClientRect();
      canvas.width = rect.width * 2;
      canvas.height = rect.height * 2;
      const ctx = canvas.getContext("2d");
      ctx.scale(2, 2);
      // Draw background
      const bg = document.getElementById("room-bg");
      ctx.drawImage(bg, 0, 0, rect.width, rect.height);
      // Draw placed artifacts
      const items = scene.querySelectorAll(".artifact.placed, .decor.placed");
      let loaded = 0;
      const total = items.length;
      if (total === 0) { downloadCanvas(canvas); return; }
      items.forEach(el => {
        const img = el.querySelector("img");
        const elRect = el.getBoundingClientRect();
        const x = elRect.left - rect.left;
        const y = elRect.top - rect.top;
        const w = elRect.width;
        const h = elRect.height;
        const tempImg = new Image();
        tempImg.crossOrigin = "anonymous";
        tempImg.onload = () => {
          ctx.save();
          const cx = x + w/2, cy = y + h/2;
          const rot = parseFloat(el.dataset.rotate || 0) * Math.PI / 180;
          const s = parseFloat(el.dataset.editorScale || 100) / 100;
          const f = el.dataset.flip === "1" ? -1 : 1;
          ctx.translate(cx, cy);
          ctx.rotate(rot);
          ctx.scale(s * f, s);
          ctx.drawImage(tempImg, -w/2/s, -h/2/s, w/s, h/s);
          ctx.restore();
          loaded++;
          if (loaded >= total) downloadCanvas(canvas);
        };
        tempImg.onerror = () => { loaded++; if (loaded >= total) downloadCanvas(canvas); };
        tempImg.src = img.src;
      });
    }

    function downloadCanvas(canvas) {
      const link = document.createElement("a");
      link.download = "ngoi-nha-lo-lo-chai.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    // ===== BUILD SCENE ELEMENTS (hidden until placed) =====
    function buildSceneElements() {
      const scene = document.getElementById("scene");

      ARTIFACTS.forEach(a => {
        const el = document.createElement("div");
        el.className = "artifact";
        el.dataset.id = a.id;
        el.style.cssText = `left:50%;top:50%;width:${ITEM_SIZE}%;`;
        el.innerHTML = `
          <img src="${a.sprite}" alt="${a.name}" />
          <div class="artifact-ring"></div>
          <span class="artifact-label">${a.name}</span>
        `;
        el.addEventListener("mouseenter", () => {
          if (panelOpen || isDragging) return;
          el.dataset.hovering = "1";
          const s = parseFloat(el.dataset.editorScale || 100) / 100;
          const r = parseFloat(el.dataset.rotate || 0);
          const f = el.dataset.flip === "1" ? -1 : 1;
          el.style.transform = `rotate(${r}deg) scale(${s * f * 1.06}, ${s * 1.06}) translateY(-3px)`;
        });
        el.addEventListener("mouseleave", () => {
          el.dataset.hovering = "0";
          if (isDragging) return;
          applyTransform(el);
        });
        // Double-click / double-tap for info
        el.addEventListener("dblclick", (e) => {
          e.stopPropagation();
          onArtifactDblClick(a, el);
        });
        let lastTap = 0;
        el.addEventListener("touchend", (e) => {
          if (isDragging) return;
          const now = Date.now();
          if (now - lastTap < 350) {
            e.preventDefault();
            onArtifactDblClick(a, el);
            lastTap = 0;
          } else {
            lastTap = now;
          }
        });
        scene.appendChild(el);
      });

      DECOR.forEach(d => {
        const el = document.createElement("div");
        el.className = "decor";
        el.dataset.id = d.id;
        el.style.cssText = `left:50%;top:50%;width:${ITEM_SIZE}%;`;
        el.innerHTML = `<img src="${d.src}" alt="${d.name}" />`;
        scene.appendChild(el);
      });

      // Structural clickable zones (not draggable)
      STRUCTURES.forEach(s => {
        const el = document.createElement("div");
        el.className = "structure-zone";
        el.dataset.id = s.id;
        el.style.cssText = `left:${s.x}%;top:${s.y}%;width:${s.w}%;height:${s.h}%;`;
        el.title = s.name;
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          onStructureClick(s);
        });
        scene.appendChild(el);
      });
    }

    // ===== CLICK TRAY → PLACE AT CENTER =====
    function toggleTrayItem(id, type) {
      if (placedItems.has(id)) {
        // Recall item from scene
        const scene = document.getElementById("scene");
        const el = type === "artifact"
          ? scene.querySelector(`.artifact[data-id="${id}"]`)
          : scene.querySelector(`.decor[data-id="${id}"]`);
        if (el) returnToTray(el);
      } else {
        placeItemCenter(id, type);
      }
    }

    function placeItemCenter(id, type) {
      if (placedItems.has(id)) return;

      const scene = document.getElementById("scene");
      const sel = type === "artifact"
        ? scene.querySelector(`.artifact[data-id="${id}"]`)
        : scene.querySelector(`.decor[data-id="${id}"]`);

      sel.classList.add("placed");
      placedItems.add(id);

      const trayItem = document.querySelector(`.tray-item[data-id="${id}"]`);
      if (trayItem) trayItem.classList.add("placed");

      // Place at center of room floor area (~50%, ~65%)
      sel.style.left = "45%";
      sel.style.top = "60%";

      // Animate appearing
      gsap.fromTo(sel, { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.3, ease: "back.out(2)" });

      // Select it and show toolbar
      selectItem(sel);
    }

    // ===== STRUCTURE CLICK → INFO =====
    function onStructureClick(structure) {
      if (panelOpen) return;
      if (!discovered.has(structure.id)) {
        discovered.add(structure.id);
        discoveredCount++;
        document.getElementById("found-count").textContent = discoveredCount;
        if (discoveredCount === 13) setTimeout(showCompletion, 1500);
      }
      openPanel(structure);
    }

    // ===== DOUBLE-CLICK → INFO =====
    function onArtifactDblClick(artifact, el) {
      if (panelOpen) return;
      if (!discovered.has(artifact.id)) {
        discovered.add(artifact.id);
        discoveredCount++;
        document.getElementById("found-count").textContent = discoveredCount;
        el.classList.add("discovered");
        if (discoveredCount === 13) setTimeout(showCompletion, 1500);
      }
      const baseS = parseFloat(el.dataset.editorScale || 100) / 100;
      const baseR = parseFloat(el.dataset.rotate || 0);
      const baseF = el.dataset.flip === "1" ? -1 : 1;
      gsap.timeline()
        .to(el, { scale: baseS * 1.12, duration: 0.1, ease: "power2.out" })
        .to(el, { scale: baseS * 0.93, duration: 0.1 })
        .to(el, { scale: baseS, duration: 0.1, onComplete: () => applyTransform(el) });
      if (artifact.specialEffect) {
        el.classList.add("fx-" + artifact.specialEffect);
        setTimeout(() => el.classList.remove("fx-" + artifact.specialEffect), 1000);
      }
      document.querySelectorAll(".artifact.placed").forEach(h => {
        if (h !== el) gsap.to(h, { opacity: 0.25, duration: 0.3 });
      });
      document.querySelectorAll(".decor.placed").forEach(d => gsap.to(d, { opacity: 0.25, duration: 0.3 }));
      document.getElementById("scene-dim").classList.add("active");
      gsap.to(el, { zIndex: 20, duration: 0 });
      openPanel(artifact);
    }

    // ===== FLOATING TOOLBAR =====
    function buildToolbar() {
      const scene = document.getElementById("scene");
      const tb = document.createElement("div");
      tb.id = "item-toolbar";
      tb.innerHTML = `
        <button data-action="rotate-ccw" title="Xoay trái">&#8634;</button>
        <button data-action="rotate-cw" title="Xoay phải">&#8635;</button>
        <div class="tb-sep"></div>
        <button data-action="size-up" title="Phóng to">+</button>
        <button data-action="size-down" title="Thu nhỏ">&minus;</button>
        <div class="tb-sep"></div>
        <button data-action="flip" title="Lật ngang">&#8596;</button>
        <button data-action="info" title="Xem chi tiết">&#9432;</button>
        <div class="tb-sep"></div>
        <button data-action="remove" title="Trả về" style="color:#c55;">&#10005;</button>
      `;
      // Prevent toolbar clicks/touches from deselecting
      tb.addEventListener("mousedown", (e) => e.stopPropagation());
      tb.addEventListener("touchstart", (e) => e.stopPropagation());
      tb.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-action]");
        if (btn) onToolbarAction(btn.dataset.action);
      });
      scene.appendChild(tb);
    }

    function onToolbarAction(action) {
      if (!selectedEl) return;
      const rot = parseFloat(selectedEl.dataset.rotate || 0);
      const scl = parseFloat(selectedEl.dataset.editorScale || 100);
      switch(action) {
        case 'rotate-cw':
          selectedEl.dataset.rotate = rot + 15;
          applyTransform(selectedEl); break;
        case 'rotate-ccw':
          selectedEl.dataset.rotate = rot - 15;
          applyTransform(selectedEl); break;
        case 'size-up':
          selectedEl.dataset.editorScale = scl + 10;
          applyTransform(selectedEl); break;
        case 'size-down':
          selectedEl.dataset.editorScale = Math.max(10, scl - 10);
          applyTransform(selectedEl); break;
        case 'flip':
          selectedEl.dataset.flip = selectedEl.dataset.flip === "1" ? "0" : "1";
          applyTransform(selectedEl); break;
        case 'info':
          if (selectedEl.classList.contains("artifact")) {
            const a = ARTIFACTS.find(a => a.id === selectedEl.dataset.id);
            if (a) onArtifactDblClick(a, selectedEl);
          }
          break;
        case 'remove':
          returnToTray(selectedEl);
          break;
      }
      // Reposition toolbar after transform
      if (selectedEl && action !== 'remove' && action !== 'info') positionToolbar(selectedEl);
    }

    function returnToTray(el) {
      const id = el.dataset.id;
      if (!id || !placedItems.has(id)) return;
      el.classList.remove("placed", "selected");
      el.dataset.rotate = 0;
      el.dataset.editorScale = 100;
      el.dataset.flip = "0";
      el.style.transform = "";
      placedItems.delete(id);
      const trayItem = document.querySelector(`.tray-item[data-id="${id}"]`);
      if (trayItem) trayItem.classList.remove("placed");
      selectedEl = null;
      hideToolbar();
    }

    function showToolbar(el) {
      const tb = document.getElementById("item-toolbar");
      // Hide info button for decor items
      const infoBtn = tb.querySelector('[data-action="info"]');
      if (infoBtn) infoBtn.style.display = el.classList.contains("artifact") ? "" : "none";
      tb.classList.add("visible");
      positionToolbar(el);
    }

    function positionToolbar(el) {
      const tb = document.getElementById("item-toolbar");
      const scene = document.getElementById("scene");
      const sceneRect = scene.getBoundingClientRect();
      const elRect = el.getBoundingClientRect();
      // Position centered above element
      const centerX = ((elRect.left + elRect.width / 2 - sceneRect.left) / sceneRect.width * 100);
      const topY = ((elRect.top - sceneRect.top - 40) / sceneRect.height * 100);
      // If too close to top, show below instead
      const bottomY = ((elRect.bottom - sceneRect.top + 8) / sceneRect.height * 100);
      const useTop = topY > 2;
      tb.style.left = centerX + "%";
      tb.style.top = (useTop ? topY : bottomY) + "%";
      tb.style.transform = "translateX(-50%)";
    }

    function hideToolbar() {
      document.getElementById("item-toolbar").classList.remove("visible");
    }

    function selectItem(el) {
      if (selectedEl && selectedEl !== el) selectedEl.classList.remove("selected");
      selectedEl = el;
      el.classList.add("selected");
      showToolbar(el);
    }

    function deselectItem() {
      if (selectedEl) selectedEl.classList.remove("selected");
      selectedEl = null;
      hideToolbar();
    }

    // ===== POINTER INTERACTIONS (mouse + touch) =====
    function getPointerXY(e) {
      if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }

    function onPointerDown(e) {
      if (e.target.closest("#item-toolbar")) return;
      const pt = getPointerXY(e);
      const el = e.target.closest(".artifact.placed, .decor.placed");
      if (el) {
        selectItem(el);
        hideToolbar();
        if (panelOpen) return;
        e.preventDefault();
        dragTarget = el;
        isDragging = false;
        const elRect = el.getBoundingClientRect();
        dragOffsetX = pt.x - elRect.left;
        dragOffsetY = pt.y - elRect.top;
      } else if (!e.target.closest(".tray-item") && !e.target.closest("#info-panel") && !e.target.closest("#hint-bar") && !e.target.closest("#header-float")) {
        deselectItem();
      }
    }

    function onPointerMove(e) {
      if (!dragTarget) return;
      isDragging = true;
      e.preventDefault();
      const pt = getPointerXY(e);
      const scene = document.getElementById("scene");
      const rect = scene.getBoundingClientRect();
      const x = ((pt.x - rect.left - dragOffsetX) / rect.width * 100);
      const y = ((pt.y - rect.top - dragOffsetY) / rect.height * 100);
      dragTarget.style.left = x + "%";
      dragTarget.style.top = y + "%";
    }

    function onPointerUp() {
      if (dragTarget) {
        const wasSelected = dragTarget;
        dragTarget = null;
        setTimeout(() => {
          isDragging = false;
          if (selectedEl && selectedEl === wasSelected) {
            applyTransform(selectedEl);
            showToolbar(selectedEl);
          }
        }, 50);
      }
    }

    function initEditor() {
      buildToolbar();

      // Mouse events
      document.addEventListener("mousedown", onPointerDown);
      document.addEventListener("mousemove", onPointerMove);
      document.addEventListener("mouseup", onPointerUp);

      // Touch events
      document.addEventListener("touchstart", onPointerDown, { passive: false });
      document.addEventListener("touchmove", onPointerMove, { passive: false });
      document.addEventListener("touchend", onPointerUp);

      // Escape to close panel
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && panelOpen) closePanel();
      });
    }

    function applyTransform(el) {
      const r = parseFloat(el.dataset.rotate || 0);
      const s = parseFloat(el.dataset.editorScale || 100) / 100;
      const f = el.dataset.flip === "1" ? -1 : 1;
      el.style.transform = `rotate(${r}deg) scale(${s * f}, ${s})`;
    }

  </script>
</body>
</html>
